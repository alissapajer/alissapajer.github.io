name: Rust

# Guards the Rust → WASM infra. Only runs when Rust files change, so prose-only
# post edits don't trigger it.
on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"
  push:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/rust.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: rust

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustup reads rust/rust-toolchain.toml and installs the pinned version
      # along with its rustfmt/clippy components and the wasm32 target.
      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      # Proves the crate actually compiles to wasm and wasm-pack packages it.
      - name: Build WASM
        run: ./build.sh
