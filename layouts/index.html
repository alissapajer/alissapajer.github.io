{{ define "main" }}
<ul class="post-list">
  {{ range (where site.RegularPages "Section" "posts").ByDate.Reverse }}
  <li>
    <a class="post-link" href="{{ .RelPermalink }}">{{ .Title }}</a>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
  </li>
  {{ end }}
</ul>
{{ end }}
